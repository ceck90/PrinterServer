# Esempio di configurazione Nginx per reverse proxy
# Questo file mostra come configurare Nginx per servire PrinterServer su un percorso personalizzato

# Configurazione base
location /printers/ {
    # Proxy pass al server locale
    proxy_pass http://localhost:4000/;
    
    # Supporto WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Headers standard
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeout per connessioni WebSocket long-lived
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
}

# Configurazione con SSL/TLS
server {
    listen 443 ssl http2;
    server_name yourdomain.com;
    
    ssl_certificate /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;
    
    location /printers/ {
        proxy_pass http://localhost:4000/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

