<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title"></title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/bootstrap/css/bootstrap-icons.min.css" rel="stylesheet">
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/bootstrap/js/popper.min.js"></script>
    <link href="assets/css/styles.css" rel="stylesheet">
    <link rel="icon" href="assets/img/favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <!-- TOP Header -->
    <div class="container-fluid d-flex justify-content-between align-middle p-3 bg-auto text-auto">
        <b><label class="text-auto" id="device-hostname"></label></b>
        <span class="bi bi-circle-half icon-theme fs-4 theme-item" type="button" alt="Theme"></span>
    </div>
    <!-- Server Card -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between">
                <h5 class="mb-0" data-i18n="server"></h5>
                <span class="button bi bi-arrow-clockwise fs-5 cursor-pointer update-button" type="button"></span>
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                    <span class="bi bi-hdd-network fs-1 me-3 text-info" id="server-icon"></span>
                    <div>
                        <span id="server-status" class="badge bg-secondary" data-i18n="connecting"></span>
                    </div>
                    <div class="ms-auto">
                        <span id="pulse-dot" class="pulse-dot"></span>
                    </div>
                </div>
                <div class="mb-3">
                    <span class="text-muted" data-i18n="lastUpdate"></span>
                    <span class="text-muted" id="last-update"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label mb-1" data-i18n="cpuLoad"></label>
                    <div class="progress rounded-pill" style="height: 18px;">
                        <div id="cpu-progress"
                            class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                            style="width: 0%;">0%</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label mb-1 me-3" data-i18n="ramUsage"></label>
                    <label class="text-primary"><i id="ramInfoLabel">--</i></label>
                    <div class="progress rounded-pill" style="height: 18px;">
                        <div id="ram-progress"
                            class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                            style="width: 0%;">0%</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label mb-1" data-i18n="cpuTemp0"></label>
                    <div class="progress rounded-pill" style="height: 18px;">
                        <div id="cpu-temp-0-progress"
                            class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                            style="width: 0%;">0°C</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label mb-1" data-i18n="cpuTemp1"></label>
                    <div class="progress rounded-pill" style="height: 18px;">
                        <div id="cpu-temp-1-progress"
                            class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                            style="width: 0%;">0°C</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Utility Card -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between">
                <h5 class="mb-0" data-i18n="utility"></h5>
                <span class="button bi bi-arrow-clockwise fs-5 update-button" type="button"></span>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="mb-1 me-4" for="apiRestartButton" data-i18n="apiRestart"></label>
                    <button class="btn btn-primary bi bi-arrow-clockwise" id="apiRestartButton"></button>
                </div>
            </div>
        </div>
    </div>
    <!-- CLI Console -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between">
                <h5 class="mb-0" data-i18n="debugConsole"></h5>
                <span class="bi bi-trash fs-3 icon-theme" type="button" id="clearConsole" alt="Clear Console"></span>
            </div>
            <div class="p-1">
                <div id="cliConsole" class="collapse show bg-dark border border-light text-light p-3 rounded-4"
                    style="height: 200px; overflow-y: auto; font-family: monospace; border:1px;">
                </div>
            </div>
        </div>
    </div>
</body>
<!-- <script src="assets/js/i18n.js" type="module"></script> -->
<script src="assets/js/status.js" type="module"></script>

</html>
