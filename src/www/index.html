<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title"></title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/bootstrap/css/bootstrap-icons.min.css" rel="stylesheet">
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/bootstrap/js/popper.min.js"></script>
    <link href="assets/flatpickr/css/flatpickr.min.css" rel="stylesheet">
    <link href="assets/flatpickr/css/material_orange.css" rel="stylesheet">
    <script src="assets/flatpickr/js/flatpickr.js"></script>
    <link href="assets/css/styles.css" rel="stylesheet">
    <link rel="icon" href="assets/img/favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <!-- TOP Header -->
    <div class="container-fluid d-flex justify-content-between align-middle p-3 bg-dark text-light">
        <div>
            <img class="img-fluid me-3" src="assets/img/mfo-logo.png" alt="" style="height: 30px;">
            <b><label class="text-auto" id="title" data-i18n="title"></label></b>
        </div>
        <div>
            <span class="bi bi-circle-half text-light fs-4 theme-item" type="button" alt="Theme"></span>
            <span class="bi bi-box-arrow-right text-light fs-4 ms-4" id="logout-button" type="button" alt="Logout"></span>
        </div>
        <div class="toast-container position-fixed end-0 p-3" id="toast-container"></div>
    </div>
    <!-- Server Card -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-center">
                <h5 class="mb-0" data-i18n="menu.title"></h5>
            </div>
            <div class="d-flex align-items-center justify-content-center py-2 flex-wrap">

                <button id="menuBtnOrders" type="button"
                    class="btn-menu btn text-auto d-flex flex-column justify-content-center align-items-center rounded-3 m-5"
                    onclick="location.href='/orders?token=' + localStorage.getItem('authToken')"
                    alt="Orders">
                    <span class="bi bi-receipt fs-1 my-2 menu-icon"></span>
                    <b data-i18n="menu.orders"></b>
                </button>
                
                <button id="menuBtnTickets" type="button"
                    class="btn-menu btn text-auto d-flex flex-column justify-content-center align-items-center rounded-3 m-5"
                    onclick="location.href='/tickets?token=' + localStorage.getItem('authToken')"
                    alt="Tickets">
                    <span class="bi bi-ticket-detailed  fs-1 my-2 menu-icon"></span>
                    <b data-i18n="menu.tickets"></b>
                </button>
                
                <button id="menuBtnBarcode" type="button"
                    class="btn-menu btn text-auto d-flex flex-column justify-content-center align-items-center rounded-3 m-5"
                    onclick="location.href='/barcode?token=' + localStorage.getItem('authToken')"
                    alt="Barcode">
                    <span class="bi bi-upc-scan fs-1 my-2 menu-icon"></span>
                    <b data-i18n="menu.barcode"></b>
                </button>

                <button id="menuBtnDashboard" type="button"
                    class="btn-menu btn text-auto d-flex flex-column justify-content-center align-items-center rounded-3 m-5"
                    onclick="location.href='/dashboard?token=' + localStorage.getItem('authToken')"
                    alt="Dashboard">
                    <span class="bi bi-graph-up fs-1 my-2 menu-icon text-auto"></span>
                    <b data-i18n="menu.dashboard"></b>
                </button>
                
                <button id="menuBtnStatus" type="button"
                    class="btn-menu btn text-auto d-flex flex-column justify-content-center align-items-center rounded-3 m-5"
                    onclick="location.href='/status?token=' + localStorage.getItem('authToken')"
                    alt="Status">
                    <span class="bi bi-info-square fs-1 my-2 menu-icon"></span>
                    <b data-i18n="menu.status"></b>
                </button>

                <button id="menuBtnSettings" type="button"
                    class="btn-menu btn text-auto d-flex flex-column justify-content-center align-items-center rounded-3 m-5"
                    onclick="location.href='/settings?token=' + localStorage.getItem('authToken')"
                    alt="Settings">
                    <span class="bi bi-gear fs-1 my-2 menu-icon"></span>
                    <b data-i18n="menu.settings"></b>
                </button>
            </div>
        </div>
    </div>


</body>

<script src="assets/js/index.js" type="module"></script>

</html>
