<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title-setup"></title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/bootstrap/css/bootstrap-icons.min.css" rel="stylesheet">
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/bootstrap/js/popper.min.js"></script>
    <link href="assets/css/styles.css" rel="stylesheet">
    <link rel="icon" href="assets/img/favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <!-- TOP Header -->
    <div class="container-fluid d-flex justify-content-between align-middle p-3 bg-dark text-light">
        <!-- <b><label class="text-auto" id="device-hostname"></label></b> -->
        <div>
            <img class="img-fluid me-3" src="assets/img/mfo-logo.png" alt="" style="height: 30px;">
            <b><label class="text-auto" id="title" data-i18n="title"></label></b>
        </div>
        <div>
            <span class="bi bi-house text-light fs-4 me-4" id="home-button" onclick="location.href='/?token=' + localStorage.getItem('authToken')" type="button" alt="Home"></span>
            <span class="bi bi-upc-scan text-light fs-4 me-4" id="barcode-button" onclick="location.href='/barcode?token=' + localStorage.getItem('authToken')" type="button" alt="Barcode"></span>
            <span class="bi bi-info-square text-light fs-4 me-4" id="status-button" onclick="location.href='/status?token=' + localStorage.getItem('authToken')" type="button" alt="Status"></span>
            <span class="bi bi-circle-half text-light fs-4 theme-item" type="button" alt="Theme"></span>
            <span class="bi bi-box-arrow-right text-light fs-4 ms-4" id="logout-button" type="button" alt="Logout"></span>
        </div>
        <div class="toast-container position-fixed end-0 p-3" id="toast-container"></div>
    </div>

    <!-- Bootstrap Toast for notifications -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
        <div id="notification-toast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-container">
                    <!-- Notification message will appear here -->
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Printer Card -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between">
                <h5 class="mb-0" data-i18n="printers"></h5>
                <span class="button bi bi-arrow-clockwise fs-5 cursor-pointer update-button" type="button"></span>
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                    <!-- <div class="align-items-center"> -->
                        <span class="bi bi-printer fs-1 me-3 text-info" id="printer-icon"></span>
                        <label for="printer-input" class="fs-4 col-3 ms-4" data-i18n="printerList"></label>
                    <!-- </div> -->
                    <div class="ms-auto">
                        <span id="pulse-dot" class="pulse-dot"></span>
                    </div>
                </div>
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th scope="col" data-i18n="printerKey"></th>
                            <th scope="col" data-i18n="printerName"></th>
                            <th scope="col" data-i18n="printerIp"></th>
                            <th scope="col" data-i18n="printerPort"></th>
                            <th scope="col" data-i18n="printerDestination"></th>
                            <th scope="col" data-i18n="printerActive"></th>
                            <th scope="col" data-i18n="printerUpsideDown"></th>
                            <th scope="col" data-i18n="printerBeepEnable"></th>
                            <th scope="col" data-i18n="printerDescription"></th>
                            <th scope="col" data-i18n="printerActions"></th>
                        </tr>
                    </thead>
                    <tbody id="printers-table-body">
                        <!-- Le righe verranno popolate dinamicamente via JS -->
                    </tbody>
                </table>
                <div class="d-flex justify-content-between mt-3">
                    <button class="btn btn-success mt-3" id="add-printer-btn" type="button" data-i18n="printerAdd"></button>
                    <button class="btn btn-primary mt-3" id="save-printers-btn" type="button" data-i18n="save"></button>
                </div>
            </div>
        </div>
    </div>
    <!-- Utility Card -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between">
                <h5 class="mb-0" data-i18n="utility"></h5>
                <span class="button bi bi-key fs-5" type="button"></span>
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                    <!-- <div class="align-items-center"> -->
                        <span class="bi bi-key fs-1 me-3 text-info" id="passord-icon"></span>
                        <label class="fs-4 col-3 ms-4" data-i18n="users"></label>
                    <!-- </div> -->
                    <div class="ms-auto">
                        <span id="pulse-dot" class="pulse-dot"></span>
                    </div>
                </div>
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th scope="col" data-i18n="login.username"></th>
                            <th scope="col" data-i18n="login.password"></th>
                            <th scope="col" data-i18n="printerActions"></th>
                        </tr>
                    </thead>
                    <tbody id="printers-table-body">
                        <!-- Le righe verranno popolate dinamicamente via JS -->
                    </tbody>
                </table>

                <!-- <div class="d-flex justify-content-end mt-3">
                    <button class="btn btn-success mt-3" id="add-user-btn" type="button" data-i18n="userAdd"></button>
                    <button class="btn btn-primary mt-3" id="save-users-btn" type="button" data-i18n="save"></button>
                </div> -->
            </div>
        </div>
    </div>

    <!-- DB Actions -->
     <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between">
                <h5 class="mb-0" data-i18n="db-actions"></h5>
                <span class="button bi bi-database fs-5" type="button"></span>
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                        <span class="bi bi-database fs-1 me-3 text-info" id="database-icon"></span>
                        <label class="fs-4 col-3 ms-4" data-i18n="database"></label>
                    <div class="ms-auto">
                        <span id="pulse-dot" class="pulse-dot"></span>
                    </div>
                </div>
                <table class="table  align-middle mt-3">
                    <!-- <thead>
                        <tr>
                            <th scope="col" data-i18n="db-action"></th>
                            <th scope="col" data-i18n="action"></th>
                        </tr>
                    </thead> -->
                    <tbody>
                        <tr>
                            <td>
                                <label class="fs-4 mb-0" for="restore-tickets-db" data-i18n="restore-tickets-db"></label>
                            </td>
                            <td>
                                <button class="btn btn-warning" id="restore-tickets-db" type="button" data-i18n="restore"></button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label class="fs-4 mb-0" for="restore-barcode-db" data-i18n="restore-barcode-db"></label>
                            </td>
                            <td>
                                <button class="btn btn-warning" id="restore-barcode-db" type="button" data-i18n="restore"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
<!-- <script src="assets/js/i18n.js" type="module"></script> -->
<script src="assets/js/settings.js" type="module"></script>

</html>
