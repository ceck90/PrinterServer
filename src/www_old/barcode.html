<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title-barcode"></title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/bootstrap/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/sweetalert2/css/sweetalert2.min.css" rel="stylesheet">
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/bootstrap/js/popper.min.js"></script>
    <script src="assets/sweetalert2/js/sweetalert2.all.min.js"></script>
    <link href="assets/css/styles.css" rel="stylesheet">
    <link rel="icon" href="assets/img/favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <!-- TOP Header -->
    <div class="container-fluid d-flex justify-content-between align-middle p-3 bg-dark text-light">
        <!-- <b><label class="text-auto" id="device-hostname"></label></b> -->
        <div>
            <img class="img-fluid me-3" src="assets/img/mfo-logo.png" alt="" style="height: 30px;">
            <b><label class="text-auto" id="title" data-i18n="title"></label></b>
        </div>
        <div>
            <span class="bi bi-house text-light fs-4 me-4" id="home-button" onclick="location.href='/?token=' + localStorage.getItem('authToken')" type="button" alt="Home"></span>
            <span class="bi bi-gear text-light fs-4 me-4" id="settings-button" onclick="location.href='/settings?token=' + localStorage.getItem('authToken')" type="button" alt="Settings"></span>
            <span class="bi bi-info-square text-light fs-4 me-4" id="status-button" onclick="location.href='/status?token=' + localStorage.getItem('authToken')" type="button" alt="Status"></span>
            <span class="bi bi-circle-half text-light fs-4 theme-item" type="button" alt="Theme"></span>
            <span class="bi bi-box-arrow-right text-light fs-4 ms-4" id="logout-button" type="button" alt="Logout"></span>
        </div>
        <div class="toast-container position-fixed end-0 p-3" id="toast-container"></div>
    </div>

    <!-- Bootstrap Toast for notifications -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
        <div id="notification-toast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-container">
                    <!-- Notification message will appear here -->
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Scanner Card -->
    <div class="container py-2">
            <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
                <div class="card-header d-flex justify-content-between align-middle">
                    <h5 class="mb-0" data-i18n="scanner.title"></h5>
                    <!-- <span class="button bi bi-arrow-clockwise fs-5 cursor-pointer update-button" type="button"></span> -->
                    <div class="btn-group me-3" role="group" aria-label="Role Switch">
                        <input type="radio" class="btn-check" name="role-switch" id="role-kitchen" autocomplete="off" checked>
                        <label class="btn btn-outline-light" for="role-kitchen" id="label-kitchen">Kitchen</label>
                        <input type="radio" class="btn-check" name="role-switch" id="role-pass" autocomplete="off">
                        <label class="btn btn-outline-light" for="role-pass" id="label-pass">Pass</label>
                    </div>
                </div>
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                        <span class="bi bi-upc-scan fs-1 me-3 text-success pulse" id="scanner-icon"></span>
                        <label for="scanner-input" class="fs-4 col-3 text-end me-4" data-i18n="scanner.input"></label>
                        <input type="text" id="scanner-input" class="form-control" placeholder="Scan QR Code..." />
                    </div>
                </div>
            </div>
    </div>

    <!-- Barcode table Card -->
    <div class="container py-2">
        <div class="card text-auto bg-auto border-0 shadow-lg rounded-4 mb-3" style="backdrop-filter: blur(6px);">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0" data-i18n="barcode.title"></h5>
                <div>
                    <span class="button bi bi-arrow-clockwise fs-5 cursor-pointer update-button me-3" id="code-reload-button"type="button"></span>
                    <span class="button bi bi-chevron-up fs-5 cursor-pointer" id="toggle-barcode-table" type="button" title="Nascondi/Mostra"></span>
                </div>
            </div>
            <div class="card-table m-1 mb-3" id="barcode-table-container" style="display: none;">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th scope="col" data-i18n="scanner.value"></th>
                            <th scope="col" data-i18n="scanner.id"></th>
                            <th scope="col" data-i18n="scanner.timestamp"></th>
                            <th scope="col" data-i18n="scanner.status"></th>
                        </tr>
                    </thead>
                    <tbody id="scanner-results">
                        <!-- Scanned results will be appended here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
<script src="assets/js/i18n.js" type="module"></script>
<script src="assets/js/barcode.js" type="module"></script>

</html>
